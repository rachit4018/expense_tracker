version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: django_backend_prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: expense_tracker_project.settings.prod
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: gunicorn expense_tracker_project.wsgi:application --bind 0.0.0.0:8000 --workers 3
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend/ex_tracker
      dockerfile: Dockerfile.prod
    container_name: react_frontend_prod
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app_network

  db:
    image: postgres:14
    container_name: postgres_db_prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app_network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_prod
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      # Add these only if SSL terminates at nginx directly
      # - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - app_network

volumes:
  postgres_data_prod:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge